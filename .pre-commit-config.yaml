default_language_version:
  ruby: 3.2.1
  node: 20.19.0
  golang: 1.25.4

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^doc-engine/source/_static/diagrams/.*\.svg$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        args: ["--config=gitleaks.toml"]
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/google/yamlfmt
    rev: v0.16.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--fix]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: render-diagrams
        name: Render PlantUML + Mermaid diagrams
        language: script
        entry: doc-engine/scripts/render-diagrams.sh
        files: ^doc-engine/source/(?!_static/).*\.txt$
        pass_filenames: true
        stages: [pre-commit]

exclude: |
  (?x)^(\
    \.devcontainer/.*\
    |\.vscode/.*\
    |doc-engine/build/.*\
    |doc-engine/venv/.*\
    |doc-engine/\.venv/.*\
    |doc-engine/source/_static/diagrams/.*\.svg\
    |doc-engine/source/make\.bat\
  )$
