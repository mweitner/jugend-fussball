  <rect x="140" y="262" width="430" height="108" fill="#c5e8ba"/>
  <rect x="140" y="370" width="430" height="108" fill="#c5e8ba"/>
  <rect x="140" y="478" width="430" height="72"  fill="#fce8d0"/>
  <!-- Feldrahmen -->
