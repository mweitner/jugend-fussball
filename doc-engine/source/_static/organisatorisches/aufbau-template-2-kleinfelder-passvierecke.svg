  <line x1="140" y1="262" x2="570" y2="262" stroke="#5a8a5a" stroke-width="1.5" stroke-dasharray="8 5"/>
  <line x1="140" y1="370" x2="570" y2="370" stroke="#1f4f2a" stroke-width="2.5" stroke-dasharray="14 6"/>
  <line x1="140" y1="478" x2="570" y2="478" stroke="#5a8a5a" stroke-width="1.5" stroke-dasharray="8 5"/>

