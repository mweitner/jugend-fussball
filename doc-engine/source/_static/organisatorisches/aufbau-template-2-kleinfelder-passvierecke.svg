<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1f6a33"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#f5f5f0"/>
  <text x="600" y="47" text-anchor="middle" font-size="26" font-family="Arial,sans-serif" fill="#2c3e50" font-weight="bold">Ausbaustufe - 2 Kleinfelder (5-gegen-5) + 4 Pass-Vierecke (Aufwaermen)</text>

  <rect x="80" y="65" width="1040" height="510" fill="#d8ead2" stroke="#4f7f5f" stroke-width="4"/>
  <text x="600" y="88" text-anchor="middle" font-size="16" font-family="Arial,sans-serif" fill="#1f3b2b">Hauptaufbau auf dem Trainingsplatz</text>

  <!-- ===== KLEINFELD A (x=140-570, y=190-550) ===== -->

  <!-- Massstabspfeile Kleinfeld A -->
  <text x="355" y="103" text-anchor="middle" font-size="12" font-family="Arial,sans-serif" fill="#1f6a33">Breite 28 m</text>
  <line x1="150" y1="110" x2="560" y2="110" stroke="#1f6a33" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="124" y="370" text-anchor="middle" font-size="12" font-family="Arial,sans-serif" fill="#1f6a33" transform="rotate(-90,124,370)">Laenge 30 m</text>
  <line x1="130" y1="190" x2="130" y2="550" stroke="#1f6a33" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="355" y="183" text-anchor="middle" font-size="12" font-family="Arial,sans-serif" fill="#0f3d1f" font-weight="bold">Kleinfeld A</text>

